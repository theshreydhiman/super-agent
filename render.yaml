services:
  - type: web
    name: super-agent-api
    runtime: node
    plan: standard
    buildCommand: npm run build:all
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: WEBHOOK_MODE
        value: true
      - key: WEBHOOK_PORT
        value: 3001
    env: node

  - type: web
    name: super-agent-dashboard
    runtime: static site
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
